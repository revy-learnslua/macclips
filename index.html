<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacClips - Share Your Clips</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes glow {
            0%, 100% { text-shadow: 0 0 20px #ff4400, 0 0 40px #ff6600; }
            50% { text-shadow: 0 0 40px #ff6600, 0 0 60px #ff8800; }
        }
        
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        
        .clip-card {
            transition: transform 0.2s;
        }
        
        .clip-card:hover {
            transform: translateX(5px);
        }
        
        button, input, textarea {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loadingScreen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at center, #0a0a2a 0%, #000000 100%); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; transition: opacity 1s;">
    
    <div style="position: relative; width: 300px; height: 300px; margin-bottom: 50px;">
        <div style="position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle, #000000 0%, #1a0033 40%, #330066 70%, #000000 100%); box-shadow: 0 0 50px rgba(0,0,0,0.8); animation: pulse 2s infinite;"></div>
        <div style="position: absolute; width: 80%; height: 80%; top: 10%; left: 10%; border-radius: 50%; background: radial-gradient(circle, #ff6600 0%, #ff3300 50%, #000000 100%); opacity: 0.6; animation: spin 4s linear infinite;"></div>
        <div style="position: absolute; width: 40%; height: 40%; top: 30%; left: 30%; border-radius: 50%; background: #000; box-shadow: 0 0 30px #ff4400;"></div>
    </div>
    
    <h1 style="color: white; font-size: 70px; font-family: 'Inter', sans-serif; font-weight: 800; letter-spacing: 5px; text-shadow: 0 0 20px #ff4400, 0 0 40px #ff6600; animation: glow 1.5s infinite;">MACCLIPS</h1>
    
    <p style="color: #ccc; font-size: 18px; text-align: center; max-width: 600px; margin-top: 20px;">The best website to share clips. Got a sus moment? Share it, got a funny clip? Share it. An international world wide pre-server full website.</p>
    
    <div id="starsContainer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;"></div>
    
    <div style="width: 280px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin-top: 50px; overflow: hidden;">
        <div id="loadingBar" style="width: 0%; height: 100%; background: linear-gradient(90deg, #ff4400, #ff8800); border-radius: 2px;"></div>
    </div>
    <p id="loadingPercent" style="color: #ff8844; margin-top: 10px;">0%</p>
</div>

<!-- MAIN CONTENT -->
<div id="mainContent" style="display: none;">
    <nav style="background: rgba(10, 10, 42, 0.95); backdrop-filter: blur(10px); padding: 15px 30px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255, 68, 0, 0.3);">
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; flex-wrap: wrap; gap: 15px;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 28px;">📋</span>
                <span style="color: white; font-size: 24px; font-weight: bold;">MacClips</span>
            </div>
            <div style="display: flex; gap: 15px;">
                <button onclick="showSection('mainpage')" style="background: none; border: none; color: white; font-size: 16px; cursor: pointer; padding: 8px 16px; border-radius: 8px;">🏠 Main Page</button>
                <button onclick="showSection('upload')" style="background: none; border: none; color: white; font-size: 16px; cursor: pointer; padding: 8px 16px; border-radius: 8px;">📤 Upload</button>
                <button onclick="showSection('account')" style="background: none; border: none; color: white; font-size: 16px; cursor: pointer; padding: 8px 16px; border-radius: 8px;">👤 Account</button>
            </div>
        </div>
    </nav>
    
    <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at center, #0a0a2a 0%, #050510 100%); z-index: -2;"></div>
    
    <div id="mainpage" class="section" style="max-width: 800px; margin: 40px auto; padding: 20px;">
        <h2 style="color: white; text-align: center; margin-bottom: 30px;">🔥 Latest Clips</h2>
        <div id="clipsContainer" style="display: flex; flex-direction: column; gap: 20px;"></div>
    </div>
    
    <div id="upload" class="section" style="display: none; max-width: 600px; margin: 40px auto; padding: 30px; background: rgba(255,255,255,0.05); border-radius: 16px; backdrop-filter: blur(10px);">
        <h2 style="color: white; margin-bottom: 20px;">📤 Upload a Clip</h2>
        <input type="text" id="clipTitle" placeholder="Clip Title" style="width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(0,0,0,0.5); border: 1px solid #ff6644; border-radius: 8px; color: white;">
        <textarea id="clipContent" placeholder="Your clip text here..." rows="5" style="width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(0,0,0,0.5); border: 1px solid #ff6644; border-radius: 8px; color: white;"></textarea>
        <input type="file" id="clipImage" accept="image/*" style="width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(0,0,0,0.5); border: 1px solid #ff6644; border-radius: 8px; color: white;">
        <button onclick="uploadClip()" style="width: 100%; padding: 12px; background: linear-gradient(90deg, #ff4400, #ff6600); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer;">Post Clip</button>
    </div>
    
    <div id="account" class="section" style="display: none; max-width: 500px; margin: 40px auto; padding: 30px; background: rgba(255,255,255,0.05); border-radius: 16px; backdrop-filter: blur(10px);">
        <h2 style="color: white; margin-bottom: 20px;">👤 Create Account</h2>
        <div id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email" style="width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(0,0,0,0.5); border: 1px solid #ff6644; border-radius: 8px; color: white;">
            <input type="text" id="loginUsername" placeholder="Username (3-20 characters)" style="width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(0,0,0,0.5); border: 1px solid #ff6644; border-radius: 8px; color: white;">
            <input type="password" id="loginPassword" placeholder="Password" style="width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(0,0,0,0.5); border: 1px solid #ff6644; border-radius: 8px; color: white;">
            <button onclick="signUp()" style="width: 100%; padding: 12px; background: linear-gradient(90deg, #ff4400, #ff6600); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer;">Sign Up / Login</button>
        </div>
        <div id="userInfo" style="display: none; text-align: center;">
            <p style="color: #4caf50;">✅ Logged in as: <span id="currentUsername"></span></p>
            <button onclick="logout()" style="margin-top: 10px; padding: 8px 20px; background: #ff4444; border: none; border-radius: 8px; color: white; cursor: pointer;">Logout</button>
        </div>
    </div>
</div>

<script>
// Create stars
const starsContainer = document.getElementById('starsContainer');
if (starsContainer) {
    for (let i = 0; i < 100; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.width = Math.random() * 2 + 1 + 'px';
        star.style.height = star.style.width;
        star.style.animationDelay = Math.random() * 3 + 's';
        starsContainer.appendChild(star);
    }
}

// Loading progress
let progress = 0;
const loadingInterval = setInterval(() => {
    progress += Math.random() * 4 + 2;
    if (progress >= 100) {
        progress = 100;
        clearInterval(loadingInterval);
        const loadingScreen = document.getElementById('loadingScreen');
        if (loadingScreen) {
            loadingScreen.style.opacity = '0';
            setTimeout(() => {
                loadingScreen.style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                renderClips();
            }, 1000);
        }
    }
    const loadingBar = document.getElementById('loadingBar');
    const loadingPercent = document.getElementById('loadingPercent');
    if (loadingBar) loadingBar.style.width = progress + '%';
    if (loadingPercent) loadingPercent.innerText = Math.floor(progress) + '%';
}, 250);

// Data
let currentUser = localStorage.getItem('macclips_user') || null;
let clips = JSON.parse(localStorage.getItem('macclips_clips')) || [];

const bannedNames = ['hitler', 'epstien', 'epstein', 'diddy', 'rape', 'raped', 'rapist', 'nazi', 'adolf', 'pedo'];

function containsBannedName(username) {
    return bannedNames.some(banned => username.toLowerCase().includes(banned));
}

if (clips.length === 0) {
    clips = [
        {id: Date.now(), username: '🤖 Server Bot', title: 'Welcome to MacClips! 🎉', content: 'Create an account and start posting!', image: null, timestamp: new Date().toISOString(), isBot: true},
        {id: Date.now() + 1, username: '🤖 Server Bot', title: 'How to Use', content: '1. Sign up\n2. Upload clips\n3. Share with the world!', image: null, timestamp: new Date().toISOString(), isBot: true}
    ];
    localStorage.setItem('macclips_clips', JSON.stringify(clips));
}

const botPosts = ['🎮 Check out this gaming clip!', '🔥 This is going viral!', '😱 Insane moment caught on camera!', '🎵 Best music clip of the day!', '🐱 Cute animal clip!'];

function addBotClip() {
    const newClip = {
        id: Date.now(),
        username: '🤖 Server Bot',
        title: 'Auto-Fetched Clip',
        content: botPosts[Math.floor(Math.random() * botPosts.length)],
        image: null,
        timestamp: new Date().toISOString(),
        isBot: true
    };
    clips.unshift(newClip);
    if (clips.length > 50) clips = clips.slice(0, 50);
    localStorage.setItem('macclips_clips', JSON.stringify(clips));
    renderClips();
}

setInterval(addBotClip, 30000);

function signUp() {
    const email = document.getElementById('loginEmail').value;
    const username = document.getElementById('loginUsername').value;
    const password = document.getElementById('loginPassword').value;
    
    if (!email || !username || !password) {
        alert('Please fill all fields');
        return;
    }
    
    if (username.length < 3 || username.length > 20) {
        alert('Username must be 3-20 characters');
        return;
    }
    
    if (containsBannedName(username)) {
        alert('❌ PERMANENT BAN: This username contains forbidden words.');
        localStorage.setItem('macclips_banned', username);
        return;
    }
    
    currentUser = username;
    localStorage.setItem('macclips_user', username);
    
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('userInfo').style.display = 'block';
    document.getElementById('currentUsername').innerText = username;
    alert('Welcome ' + username + '!');
    showSection('mainpage');
}

function logout() {
    currentUser = null;
    localStorage.removeItem('macclips_user');
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('userInfo').style.display = 'none';
}

function uploadClip() {
    if (!currentUser) {
        alert('Create an account first!');
        showSection('account');
        return;
    }
    
    const title = document.getElementById('clipTitle').value;
    const content = document.getElementById('clipContent').value;
    
    if (!title || !content) {
        alert('Please add title and content');
        return;
    }
    
    const newClip = {
        id: Date.now(),
        username: currentUser,
        title: title,
        content: content,
        image: null,
        timestamp: new Date().toISOString(),
        isBot: false
    };
    
    clips.unshift(newClip);
    localStorage.setItem('macclips_clips', JSON.stringify(clips));
    
    document.getElementById('clipTitle').value = '';
    document.getElementById('clipContent').value = '';
    alert('Clip posted!');
    showSection('mainpage');
    renderClips();
}

function renderClips() {
    const container = document.getElementById('clipsContainer');
    if (!container) return;
    
    clips = JSON.parse(localStorage.getItem('macclips_clips')) || [];
    
    if (clips.length === 0) {
        container.innerHTML = '<p style="color: white; text-align: center;">No clips yet. Be the first to post!</p>';
        return;
    }
    
    container.innerHTML = clips.map(clip => `
        <div style="background: rgba(20,20,50,0.7); backdrop-filter: blur(10px); border-radius: 16px; padding: 20px; border-left: 4px solid #ff6644;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <div style="color: #ff8844; font-weight: bold;">${clip.isBot ? '🤖 ' : '👤 '}${escapeHtml(clip.username)}</div>
                <div style="color: #666; font-size: 12px;">${new Date(clip.timestamp).toLocaleString()}</div>
            </div>
            <div style="color: white; font-size: 18px; font-weight: 600; margin: 10px 0;">${escapeHtml(clip.title)}</div>
            <div style="color: #ccc;">${escapeHtml(clip.content)}</div>
        </div>
    `).join('');
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function showSection(sectionId) {
    document.querySelectorAll('.section').forEach(section => {
        section.style.display = 'none';
    });
    document.getElementById(sectionId).style.display = 'block';
    if (sectionId === 'mainpage') renderClips();
}

window.onload = function() {
    if (currentUser && !localStorage.getItem('macclips_banned')) {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('userInfo').style.display = 'block';
        document.getElementById('currentUsername').innerText = currentUser;
    }
};
</script>
</body>
</html>
